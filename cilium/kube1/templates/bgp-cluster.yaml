apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  name: cilium-bgp
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
  bgpInstances:
  - name: "main"
    localASN: 64550
    localPort: 179
    peers:
    - name: "router"
      peerASN: 64512
      peerAddress: "10.1.1.1"
      peerConfigRef:
        name: "cilium-peer"