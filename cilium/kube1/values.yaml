cilium:
  cluster:
    name: kube
    id: 100
  hubble:
    enabled: true
    relay:
      enabled: true
      rollOutPods: true
    ui:
      enabled: true
  ipv4NativeRoutingCIDR: 10.0.0.0/8
  ipam:
    # -- Configure IP Address Management mode.
    # ref: https://docs.cilium.io/en/stable/network/concepts/ipam/
    mode: "cluster-pool"
    # -- Maximum rate at which the CiliumNode custom resource is updated.
    ciliumNodeUpdateRate: "15s"
    operator:
      # -- IPv4 CIDR list range to delegate to individual nodes for IPAM.
      clusterPoolIPv4PodCIDRList: ["10.244.0.0/16"]
      # -- IPv4 CIDR mask size to delegate to individual nodes for IPAM.
      clusterPoolIPv4MaskSize: 24

  kubeProxyReplacement: true
  k8sServiceHost: kube.labs.ahinh.me
  k8sServicePort: 6443
  gatewayAPI:
    enabled: true
    externalTrafficPolicy: Cluster
  envoy:
    enabled: true
    securityContext:
      capabilities:
        keepCapNetBindService: true
        envoy:
        - NET_BIND_SERVICE
        - CAP_NET_ADMIN
        - CAP_BPF
        - NET_ADMIN
        - SYS_ADMIN
        - SYS_RESOURCE
  securityContext:
    capabilities:
      ciliumAgent:
        # Use to set socket permission
        - CHOWN
        # Used to terminate envoy child process
        - KILL
        # Used since cilium modifies routing tables, etc...
        - NET_ADMIN
        # Used since cilium creates raw sockets, etc...
        - NET_RAW
        # Used since cilium monitor uses mmap
        - IPC_LOCK
        # Used in iptables. Consider removing once we are iptables-free
        - SYS_MODULE
        # Needed to switch network namespaces (used for health endpoint, socket-LB).
        # We need it for now but might not need it for >= 5.11 specially
        # for the 'SYS_RESOURCE'.
        # In >= 5.8 there's already BPF and PERMON capabilities
        - SYS_ADMIN
        - NET_BIND_SERVICE
        # Could be an alternative for the SYS_ADMIN for the RLIMIT_NPROC
        - SYS_RESOURCE
        # Both PERFMON and BPF requires kernel 5.8, container runtime
        # cri-o >= v1.22.0 or containerd >= v1.5.0.
        # If available, SYS_ADMIN can be removed.
        #- PERFMON
        #- BPF
        # Allow discretionary access control (e.g. required for package installation)
        - DAC_OVERRIDE
        # Allow to set Access Control Lists (ACLs) on arbitrary files (e.g. required for package installation)
        - FOWNER
        # Allow to execute program that changes GID (e.g. required for package installation)
        - SETGID
        # Allow to execute program that changes UID (e.g. required for package installation)
        - SETUID
        # Allow to read dmesg and get kernel pointers when kptr_restrict=1
        - SYSLOG
  # bgp:
  #   enabled: true
  #   announce:
  #     podCIDR: true
  #     # Controlled by MetalLB (for now?)
  #     loadbalancerIP: false

  bgpControlPlane:
    enabled: true

  nodeinit:
    enabled: true

  externalIPs:
    enabled: true

  nodePort:
    enabled: true

  hostPort:
    enabled: true
